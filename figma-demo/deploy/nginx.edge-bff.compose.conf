# Used by docker-compose: edge reverse-proxy → SPA + BFF on one port (80).
# TLS: terminate at CDN / outer nginx / certbot; this stack can stay on HTTP internally.

upstream spa_upstream {
    server spa:80;
}

upstream bff_upstream {
    server bff:8787;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 512k;

    location /api/bff/ {
        proxy_pass http://bff_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://spa_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
